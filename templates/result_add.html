<!DOCTYPE html>
<html>
<head>
    <title>Add Quiz Result</title>
</head>
<body>
    <h1>Add Quiz Result</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post" action="/results/add">
        <label>Student:</label>
        <select name="student_id">
            {% for student in students %}
                <option value="{{ student.id }}">{{ student.first_name }} {{ student.last_name }}</option>
            {% endfor %}
        </select><br><br>

        <label>Quiz:</label>
        <select name="quiz_id">
            {% for quiz in quizzes %}
                <option value="{{ quiz.id }}">{{ quiz.subject }} - {{ quiz.quiz_date }}</option>
            {% endfor %}
        </select><br><br>

        <label>Score:</label>
        <input type="number" name="score"><br><br>

        <button type="submit">Add Result</button>
    </form>

    <p><a href="/dashboard">Back to Dashboard</a></p>
</body>
</html>
